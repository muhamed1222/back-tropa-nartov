version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: tropa-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tropa_nartov}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tropa_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

networks:
  tropa_network:
    driver: bridge

volumes:
  postgres_data_prod:
